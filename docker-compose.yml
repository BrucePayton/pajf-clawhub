services:
  # 后端 Node.js API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-api
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - HOST=0.0.0.0
      - DB_HOST=mysql-server
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=OpenclawAppPlatform
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql-server:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3010/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - openclaw-net

  # 前端 Nginx 静态托管与反向代理服务
  web:
    image: nginx:latest
    container_name: openclaw-nginx
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - openclaw-net

  # MySQL 数据库服务
  mysql-server:
    image: mysql:latest
    container_name: mysql-server
    command: --sort-buffer-size=8M --max-allowed-packet=64M
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=OpenclawAppPlatform
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
