services:
  # 后端 Node.js API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-api
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - HOST=0.0.0.0
      # 如果有其他环境变量（如 GEMINI_API_KEY, 数据库配置），可以在这里注入
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data # 持久化挂载 JSON 数据目录
    depends_on:
      - mysql-server
    restart: always
    networks:
      - openclaw-net

  # 前端 Nginx 静态托管与反向代理服务
  web:
    image: nginx:latest
    container_name: openclaw-nginx
    ports:
      - "3080:80" # 映射到宿主机的 3080 端口访问前端
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api # 确保后端先启动
    restart: always
    networks:
      - openclaw-net

  # MySQL 数据库服务
  mysql-server:
    image: mysql:latest
    container_name: mysql-server
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=OpenclawAppPlatform
    volumes:
      - ./mysql_data:/var/lib/mysql # 将数据持久化到项目目录的 mysql_data 文件夹
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro # 将初始化 SQL 文件挂载进去，容器首次启动时会自动执行
    restart: always
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
